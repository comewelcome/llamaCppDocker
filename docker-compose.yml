services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    env_file:
      - .env
    environment:
      - HF_HOME=/cache
      - HF_HUB_CACHE=/cache
      - TRANSFORMERS_CACHE=/cache
      - LLAMA_ARG_MODEL=${MODEL}
      - LLAMA_ARG_MMPROJ=${MMPROJ}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=${PORT}
      - LLAMA_ARG_CTX_SIZE=${CTX_SIZE}
      - LLAMA_ARG_N_GPU_LAYERS=${GPU_LAYERS}
      - LLAMA_ARG_TENSOR_SPLIT=${TENSOR_SPLIT}
      - LLAMA_ARG_THREADS=${THREADS}
      - LLAMA_ARG_BATCH_SIZE=${BATCH_SIZE}
      - LLAMA_ARG_N_PARALLEL=${PARALLEL}
      - LLAMA_ARG_FLASH_ATTN=${FLASH_ATTENTION}
      - LLAMA_ARG_CACHE_TYPE_K=${CACHE_TYPE_K}
      - LLAMA_ARG_CACHE_TYPE_V=${CACHE_TYPE_V}
      - LLAMA_ARG_DRAFT=${SPEC_DRAFT_N_MAX}
      - LLAMA_ARG_SPEC_PMIN=${SPEC_DRAFT_P_MIN}
      - LLAMA_ARG_SPEC_TYPE=${SPEC_TYPE}
      - LLAMA_ARG_TEMP=${TEMP}
      - LLAMA_ARG_TOP_K=${TOP_K}
      - LLAMA_ARG_TOP_P=${TOP_P}
      - LLAMA_ARG_REPEAT_PENALTY=${REPEAT_PENALTY}
      - LLAMA_ARG_PRESENCE_PENALTY=${PRESENCE_PENALTY}
      - LLAMA_ARG_IMAGE_MIN_TOKENS=${IMAGE_MIN_TOKENS}
      - LLAMA_ARG_REASONING_BUDGET=${REASONING_BUDGET}
      - LLAMA_ARG_KV_UNIFIED=${KV_UNIFIED}
    volumes:
      - ${LLAMA_MODELS:-./models}:/models
      - ${LLAMA_CACHE:-./cache}:/cache
    ports:
      - "${PORT}:${PORT}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0','1']
              capabilities: [gpu]
    restart: unless-stopped